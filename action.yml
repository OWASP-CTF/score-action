name: "OWASP CTF Score"
description: "Score an OWASP CTF patch PR against the private scorer image and record the result on the leaderboard."
branding:
  icon: "award"
  color: "purple"

# ─────────────────────────────────────────────────────────────────────────────
# Composite action. The consumer builds + boots the PR's app on a docker network
# (that part is app-specific and stays in the consumer workflow), then calls this
# action to: pull the private scorer, score the running app, POST the result to the
# leaderboard API using the job's GitHub OIDC id-token, and update the PR comment.
#
# ONE-JOB MODEL — unlike the old four-job consumer workflow, this runs as steps in a
# single job. That job therefore holds both `id-token: write` and `pull-requests:
# write` alongside the untrusted `docker build`. This is safe because the untrusted
# code never runs on the runner host: the PR is only ever `docker build`/`docker run`
# into containers on an --internal network, so it cannot read the runner's OIDC
# request token or GITHUB_TOKEN. Do NOT add a step that executes PR-controlled code
# directly on the runner (e.g. `npm run` from the PR checkout) in this job.
#
# LEADERBOARD AUTH — no stored secret. The action mints a GitHub OIDC id-token
# (audience `ctf-score`) and sends it as a bearer to POST /score; the server
# authorizes by the token's repository_owner. Identity/provenance (author, PR, SHA)
# travel in the request body from the trusted `github.event` context.
# ─────────────────────────────────────────────────────────────────────────────

inputs:
  target:
    description: "Scorer target: juice-shop | dvwa | webgoat | securityshepherd | vampi | vulnerableapp."
    required: true
  app-url:
    description: "Base URL the scorer hits, reachable on `network` (e.g. http://app, http://app:8080/WebGoat)."
    required: true

  network:
    description: "Docker network the app runs on; the scorer container joins it."
    required: false
    default: "ctfnet"
  score-image:
    description: "Private scorer image."
    required: false
    default: "ghcr.io/owasp-ctf/score:latest"
  score-api:
    description: "Base URL of the scoring API (POST <score-api>/score)."
    required: false
    default: "https://api.ctf.owasp.org"
  audience:
    description: "OIDC id-token audience the scoring API requires."
    required: false
    default: "ctf-score"

  extra-env:
    description: "Newline-separated KEY=VALUE pairs passed to the scorer container as -e (e.g. WEBWOLF_URL=..., WEBGOAT_DESER_PAYLOAD=...)."
    required: false
    default: ""
  source-mount:
    description: "Host path to mount READ-ONLY at /src and expose as CTF_UPSTREAM_DIR (for source-analysis challenges, e.g. juice-shop). Empty = no mount."
    required: false
    default: ""

  post-comment:
    description: "Whether to upsert the PR result comment."
    required: false
    default: "true"
  leaderboard-url:
    description: "Leaderboard URL shown in the PR comment."
    required: false
    default: "https://ctf.owasp.org/leaderboard"

outputs:
  open:
    description: "Number of challenges still open (scorer exit code; 0 = all patched). Empty if scoring did not run."
    value: ${{ steps.score.outputs.open }}
  recorded:
    description: "'true' if solves were sent to the leaderboard."
    value: ${{ steps.post.outputs.recorded }}

runs:
  using: "composite"
  steps:
    - name: Log in to GHCR (pull the private scorer image)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Score the running app (embedded rubric)
      id: score
      shell: bash
      env:
        SCORE_IMAGE: ${{ inputs.score-image }}
        NETWORK: ${{ inputs.network }}
        TARGET: ${{ inputs.target }}
        APP_URL: ${{ inputs.app-url }}
        EXTRA_ENV: ${{ inputs.extra-env }}
        SOURCE_MOUNT: ${{ inputs.source-mount }}
      run: |
        set -euo pipefail
        out="$(mktemp -d)"
        args=(--rm --network "$NETWORK" -e GITHUB_WORKSPACE=/out -v "$out:/out" -w /out)

        # Per-app env: one KEY=VALUE per line. Values are base64/urls (no spaces), so
        # word-splitting on newlines is safe here.
        if [ -n "${EXTRA_ENV:-}" ]; then
          while IFS= read -r line; do
            [ -n "$line" ] || continue
            args+=(-e "$line")
          done <<< "$EXTRA_ENV"
        fi

        # Optional read-only source mount for static-analysis challenges.
        if [ -n "${SOURCE_MOUNT:-}" ]; then
          args+=(-e CTF_UPSTREAM_DIR=/src -v "$SOURCE_MOUNT:/src:ro")
        fi

        # ENTRYPOINT is the score binary, so pass only its args (no leading `score`).
        rc=0
        docker run "${args[@]}" "$SCORE_IMAGE" --quiet --target "$TARGET" --url "$APP_URL" || rc=$?

        # The scorer exits with the count of still-open challenges (0 = all patched); a
        # partial patch is a normal non-zero, NOT a failure. Only >=100 is a real crash.
        if [ "$rc" -ge 100 ]; then
          echo "::error::scorer failed to run (exit $rc)"
          exit "$rc"
        fi
        echo "Scorer finished: $rc challenge(s) still open."
        echo "open=$rc" >> "$GITHUB_OUTPUT"
        echo "sidecar=$out/ctf-score.json" >> "$GITHUB_OUTPUT"

    - name: Mint the GitHub OIDC id-token
      id: identity
      if: ${{ always() }}
      uses: cnuss/actions-identity@b9bc5d6472e00dfca0490bdf539eb4d4b729807d # v1.1.0
      with:
        id-token-audience: ${{ inputs.audience }}

    - name: Record the score on the leaderboard
      id: post
      if: ${{ always() && steps.score.outputs.sidecar != '' }}
      shell: bash
      env:
        SCORE_API: ${{ inputs.score-api }}
        # NOT the action's `token` output: that falls back to the runtime token, a live
        # credential we must never POST off-box. id-token is empty if id-token:write is
        # absent, which correctly skips the write.
        ID_TOKEN: ${{ steps.identity.outputs.id-token }}
        SIDECAR: ${{ steps.score.outputs.sidecar }}
        AUTHOR: ${{ github.event.pull_request.user.login }}
        PR: ${{ github.event.pull_request.number }}
        SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -euo pipefail
        if [ ! -s "$SIDECAR" ]; then
          echo "No sidecar produced — nothing to record."; exit 0
        fi
        if [ -z "${ID_TOKEN:-}" ]; then
          echo "::warning::no OIDC id-token (need permissions: id-token: write) — leaderboard write skipped."; exit 0
        fi

        solved_count=$(jq '(.solved // []) | length' "$SIDECAR")

        # Provenance from the trusted github.event context; solves/target from the sidecar.
        body=$(jq -c \
          --arg author "$AUTHOR" --argjson pr "${PR:-0}" --arg sha "$SHA" \
          '{author: $author, target: .target, solved: (.solved // []), pr: $pr, sha: $sha}' \
          "$SIDECAR")

        code=$(curl -sS -o /tmp/score-resp.json -w '%{http_code}' \
          -X POST "${SCORE_API%/}/score" \
          -H "Authorization: Bearer $ID_TOKEN" \
          -H "Content-Type: application/json" \
          --data "$body" || echo "000")
        echo "POST /score -> $code"
        cat /tmp/score-resp.json 2>/dev/null || true; echo

        # 200 both-backends-ok, 202 degraded (still received). Points recorded only when
        # the PR actually solved something.
        if { [ "$code" = "200" ] || [ "$code" = "202" ]; } && [ "$solved_count" -gt 0 ]; then
          echo "recorded=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Upsert the result comment
      if: ${{ always() && inputs.post-comment == 'true' }}
      uses: actions/github-script@v7
      env:
        RECORDED: ${{ steps.post.outputs.recorded }}
        SCORE_RESULT: ${{ steps.score.outcome }}
        LEADERBOARD_URL: ${{ inputs.leaderboard-url }}
      with:
        script: |
          const marker = '<!-- ctf-score-ack -->';
          const sha = (context.payload.pull_request?.head?.sha || '').slice(0, 7);
          const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const board = process.env.LEADERBOARD_URL;
          // Three outcomes: the scorer succeeding but solving nothing is NOT a failure.
          let headline, detail;
          if (process.env.SCORE_RESULT !== 'success') {
            headline = '⚠️ **Scoring did not complete**';
            detail = `We couldn't score this commit — your app may have failed to build or boot. `
              + `Check the [scoring run](${run}) for details, then push a new commit to retry.`;
          } else if (process.env.RECORDED === 'true') {
            headline = '🎉 **Score recorded!**';
            detail = `Great work — your patch has been evaluated and your result is now on the `
              + `[leaderboard](${board})! 🏆 Head over and see where you rank!`;
          } else {
            headline = '✅ **Scoring complete — no points yet**';
            detail = `Your app built and ran, and we scored it against the full challenge rubric — but `
              + `this commit didn't solve any challenges, so there's nothing to add to the `
              + `[leaderboard](${board}) yet. Patch a vulnerability and push again! 💪`;
          }
          const body = `${marker}\n${headline}\n\n${detail}\n\nCommit: \`${sha}\``;
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          else await github.rest.issues.createComment({ owner, repo, issue_number, body });
