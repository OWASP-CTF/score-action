name: "OWASP CTF Score Action"
description: "Score an OWASP CTF patch PR against the scorer image and record the result on the leaderboard."
branding:
  icon: "award"
  color: "purple"

# Composite (not a container action) so it can docker login and pull the internal scorer image.
# The PR's code only runs inside containers on the --internal ctfnet, never on the host.

inputs:
  target:
    description: "Scorer target: juice-shop | dvwa | webgoat | securityshepherd | vampi | vulnerableapp."
    required: true
  app-url:
    description: "Base URL the scorer hits, reachable on the ctfnet network (e.g. http://app, http://app:8080/WebGoat)."
    required: true
  ref:
    description: "PR head to check out and build (untrusted — only docker-built, never run on the host)."
    default: ${{ github.event.pull_request.head.sha }}
  id-token-audience:
    description: "Audience for the minted OIDC id-token the leaderboard authorizes."
    default: "ctf-score"
  github-token:
    description: "GitHub token used to log in to GHCR (pull the internal scorer image)."
    default: ${{ github.token }}
  score-image:
    description: "Scorer image to pull and run."
    default: "ghcr.io/owasp-ctf/score:latest"
  app-image:
    description: "Prebuilt app image to score (e.g. stock upstream for dogfooding). When set, the scorer pulls it instead of building the PR's app from the checked-out workspace."
    default: ""

runs:
  using: "composite"
  steps:
    # Marker is TARGET-SCOPED (<!-- ctf-score:<target> -->), and the final step below rewrites
    # this very comment with the result. Target-scoping matters when one PR scores several apps
    # (dc34's dogfood matrix): a single shared marker had all matrix jobs racing to overwrite one
    # comment. It also matches the marker dc34's own per-target comment step already uses, so the
    # pending comment becomes the result comment instead of a duplicate.
    - name: Upsert the "scoring in progress" comment
      uses: actions/github-script@v7
      env:
        CTF_TARGET: ${{ inputs.target }}
      with:
        script: |
          const marker = `<!-- ctf-score:${process.env.CTF_TARGET} -->`;
          const sha = (context.payload.pull_request.head.sha || '').slice(0, 7);
          const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `${marker}\n⏳ **Scoring your patch…**\n\n`
            + `Hang tight — we're building your app and running the full challenge rubric against it. `
            + `This takes a few minutes. This comment will update itself with your result as soon as the `
            + `[scoring run](${run}) finishes — no need to do anything.\n\n`
            + `Commit: \`${sha}\``;
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number,
          });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Check out the PR head (untrusted — only docker-built, never run on the host)
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}
        allow-unsafe-pr-checkout: true

    - name: Mint the OIDC id-token for the leaderboard
      id: identity
      uses: cnuss/actions-identity@b9bc5d6472e00dfca0490bdf539eb4d4b729807d # v1.1.0
      with:
        id-token-audience: ${{ inputs.id-token-audience }}

    - name: Log in to GHCR (pull the internal scorer image)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Score + record
      id: score
      shell: bash
      env:
        SCORE_IMAGE: ${{ inputs.score-image }}
        TARGET: ${{ inputs.target }}
        APP_URL: ${{ inputs.app-url }}
        APP_IMAGE: ${{ inputs.app-image }}
        ID_TOKEN: ${{ steps.identity.outputs.id-token }}
        SCORE_API: "https://dyekymos1dkde.cloudfront.net" # TEMP: revert to https://api.ctf.owasp.org once DNS lands
      run: |
        set -euo pipefail
        # Run the image's baked entrypoint.sh: build/boot the PR app on ctfnet, score, POST.
        # APP_IMAGE (optional) makes the scorer pull a prebuilt app instead of building the PR's.
        # SCORER_IMAGE = the image we run, so the bring-up's sibling probe uses the same build.
        docker run --rm \
          --entrypoint /usr/local/bin/entrypoint.sh \
          -e TARGET -e APP_URL -e APP_IMAGE -e ID_TOKEN -e SCORE_API -e NETWORK=ctfnet \
          -e SCORER_IMAGE="$SCORE_IMAGE" \
          -e GITHUB_WORKSPACE=/github/workspace \
          -e GITHUB_EVENT_PATH=/github/event.json \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -v "${GITHUB_EVENT_PATH}:/github/event.json:ro" \
          "$SCORE_IMAGE"

    # Resolve the ⏳ pending comment IN PLACE (same target-scoped marker) with the result, so the
    # PR ends with ONE comment per target and the promise ("it will update itself") holds.
    # Without this the ack sits pending forever on consumer repos — the scorer writes the redacted
    # table to $GITHUB_WORKSPACE/ctf-score.md, but nothing published it.
    #
    # Leak-safe: the scorer already redacts per-challenge detail from ctf-score.md; only the
    # contestant's own total lands here. always() so a failed/crashed run still replaces the ack
    # with a real outcome instead of a permanent "Scoring…".
    - name: Upsert the score comment (resolves the ack in place)
      if: ${{ always() }}
      uses: actions/github-script@v7
      env:
        CTF_TARGET: ${{ inputs.target }}
        SCORE_OUTCOME: ${{ steps.score.outcome }}
      with:
        script: |
          const fs = require('fs');
          const target = process.env.CTF_TARGET;
          const marker = `<!-- ctf-score:${target} -->`;
          const names = {
            'juice-shop': 'Juice Shop', dvwa: 'DVWA', vampi: 'VAmPI',
            vulnerableapp: 'VulnerableApp', webgoat: 'WebGoat', securityshepherd: 'Security Shepherd',
          };
          const app = names[target] || target;
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const sha = (context.payload.pull_request.head.sha || '').slice(0, 7);
          const run = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
          const path = `${process.env.GITHUB_WORKSPACE}/ctf-score.md`;
          let table = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '';
          if (process.env.SCORE_OUTCOME !== 'success' || !table.trim()) {
            table = `## ⚠️ ${app} — scoring did not complete\n\n`
              + `We couldn't score this commit — your app may have failed to build or boot. `
              + `Check the [scoring run](${run}) for details, then push a new commit to retry.\n`;
          }
          // Fold the app name into the scorer's generic title line.
          table = table.replace(/^## 🏆 CTF Patch Score$/m, `## 🏆 ${app} — CTF Patch Score`);
          const body = `${marker}\n${table}\nCommit: \`${sha}\` · [scoring run](${run})`;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number,
          });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
