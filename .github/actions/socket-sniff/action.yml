name: "docker socket sniff (score image as container action)"
description: "Reports whether the score image, run as a runs.using=docker container action, can drive the host docker daemon via the mounted socket."
runs:
  using: "docker"
  image: "docker://ghcr.io/owasp-ctf/score:latest"
  entrypoint: "/bin/sh"
  args:
    - "-c"
    - |
      echo "=== score image AS a runs.using=docker container action ==="
      echo "whoami: $(id)"
      if [ -S /var/run/docker.sock ]; then
        echo "RESULT: docker.sock IS present"
      else
        echo "RESULT: docker.sock is NOT present"; exit 0
      fi
      echo "docker CLI: $(command -v docker || echo MISSING)"
      echo "--- can the baked-in CLI reach the host daemon? ---"
      if docker version --format 'server={{.Server.Version}}' 2>&1; then
        echo "RESULT: score image CAN drive the host docker daemon"
        docker ps --format '{{.Image}}' | head -5
      else
        echo "RESULT: score image could NOT reach the daemon"
      fi
