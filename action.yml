name: "OWASP CTF Score"
description: "Score an OWASP CTF patch PR against the scorer image and record the result on the leaderboard."
branding:
  icon: "award"
  color: "purple"

# ─────────────────────────────────────────────────────────────────────────────
# Docker CONTAINER action — the action IS the scorer image
# (docker://ghcr.io/OWASP-CTF/score:latest, org-internal visibility, pulled by the
# runner under pull_request_target). So there is no `docker login` / `docker pull`
# of a separate scorer: this action's entrypoint runs INSIDE the scorer image, which
# already ships the rubric, the `score` binary, node, curl, and the docker CLI.
#
# What the entrypoint does, in one container:
#   1. run the consumer's `run:` setup on the HOST docker daemon (the socket is
#      bind-mounted into container actions) — build + boot the PR app on `network`.
#   2. attach THIS container to that `network` so the in-process scorer can HTTP the
#      app (which sits on an --internal, internet-less network).
#   3. score the running app with the embedded rubric (in-process — we are the image).
#   4. mint the job's GitHub OIDC id-token and POST the result to the leaderboard API.
#   5. upsert the PR result comment.
#
# ONE-JOB MODEL — this runs as a single step, so its job holds `id-token: write` and
# `pull-requests: write` alongside the untrusted `docker build`. Safe because the PR's
# code is ONLY ever `docker build`/`docker run` into containers on an --internal
# network; it never executes on the runner host and cannot read the OIDC request token
# or GITHUB_TOKEN. This container attaches to that internal network only to make
# client HTTP requests to the app — it runs no inbound service and does not route the
# app's traffic out, so the app stays internet-less. Do NOT add a consumer step that
# executes PR-controlled code directly on the host.
#
# LEADERBOARD AUTH — no stored secret. The action mints a GitHub OIDC id-token
# (audience `ctf-score`) and sends it as a bearer to POST /score; the server authorizes
# by the token's repository_owner. Identity/provenance (author, PR, SHA) travel in the
# request body from the trusted `github.event` context, never from PR code.
# ─────────────────────────────────────────────────────────────────────────────

inputs:
  target:
    description: "Scorer target: juice-shop | dvwa | webgoat | securityshepherd | vampi | vulnerableapp."
    required: true
  app-url:
    description: "Base URL the scorer hits, reachable on `network` (e.g. http://app, http://app:8080/WebGoat)."
    required: true

  run:
    description: >
      App-specific setup script (bash) run BEFORE scoring: build the PR's app image, create the
      `network`, boot the app + any deps on it, and wait for health. Runs inside this container
      but drives the HOST docker daemon via the bind-mounted socket; `$SCORER_IMAGE` and
      `$NETWORK` are exported for it. Trusted, consumer-authored YAML — it may `docker
      build`/`docker run` the PR's code into containers, but must NEVER execute PR-controlled
      code directly (see Security model).
    required: false
    default: ""

  network:
    description: "Docker network the app runs on; this container attaches to it to reach the app."
    required: false
    default: "ctfnet"
  score-image:
    description: >
      Scorer image tag your `run:` setup references as `$SCORER_IMAGE` (e.g. for readiness
      probes via `docker run`). The action itself always runs as ghcr.io/OWASP-CTF/score:latest
      (a docker action's image is fixed in metadata and cannot be overridden per-call).
    required: false
    default: "ghcr.io/owasp-ctf/score:latest"
  score-api:
    description: "Base URL of the scoring API (POST <score-api>/score)."
    required: false
    default: "https://api.ctf.owasp.org"
  audience:
    description: "OIDC id-token audience the scoring API requires."
    required: false
    default: "ctf-score"

  extra-env:
    description: "Newline-separated KEY=VALUE pairs exported to the in-process scorer (e.g. WEBWOLF_URL=..., WEBGOAT_DESER_PAYLOAD=...)."
    required: false
    default: ""
  source-mount:
    description: >
      Path (inside this container) exposed to the scorer as CTF_UPSTREAM_DIR for source-analysis
      challenges. The consumer checkout is mounted at /github/workspace, so pass that (or a
      subdir). Empty = no source analysis.
    required: false
    default: ""

  post-comment:
    description: "Whether to upsert the PR result comment."
    required: false
    default: "true"
  leaderboard-url:
    description: "Leaderboard URL shown in the PR comment."
    required: false
    default: "https://ctf.owasp.org/leaderboard"
  github-token:
    description: "Token for the PR result comment. Pass ${{ github.token }} (container actions do not receive it automatically). Empty = skip the comment."
    required: false
    default: ""

outputs:
  open:
    description: "Number of challenges still open (scorer exit code; 0 = all patched). Empty if scoring did not run."
  recorded:
    description: "'true' if solves were sent to the leaderboard."

runs:
  using: "docker"
  image: "docker://ghcr.io/owasp-ctf/score:latest"
  entrypoint: "/bin/bash"
  env:
    TARGET: ${{ inputs.target }}
    APP_URL: ${{ inputs.app-url }}
    RUN: ${{ inputs.run }}
    NETWORK: ${{ inputs.network }}
    SCORE_IMAGE: ${{ inputs.score-image }}
    SCORE_API: ${{ inputs.score-api }}
    AUDIENCE: ${{ inputs.audience }}
    EXTRA_ENV: ${{ inputs.extra-env }}
    SOURCE_MOUNT: ${{ inputs.source-mount }}
    POST_COMMENT: ${{ inputs.post-comment }}
    LEADERBOARD_URL: ${{ inputs.leaderboard-url }}
    GH_TOKEN: ${{ inputs.github-token }}
  args:
    - "-c"
    - |
      set -euo pipefail
      export SCORER_IMAGE="$SCORE_IMAGE" NETWORK

      # 1) App setup on the HOST daemon (bind-mounted socket): build + boot + wait.
      if [ -n "${RUN:-}" ]; then
        echo "::group::App setup"
        bash -euo pipefail -c "$RUN"
        echo "::endgroup::"
      fi

      # 2) Join the app's (internal) network so the in-process scorer can reach it.
      if [ -n "${NETWORK:-}" ]; then
        if docker network connect "$NETWORK" "$(cat /etc/hostname)" 2>/dev/null; then
          echo "Attached scorer container to network '$NETWORK'."
        else
          echo "::warning::could not attach to '$NETWORK' (already attached, or app is on the host default network)."
        fi
      fi

      # 3) Score in-process — we ARE the scorer image; rubric is embedded. Sidecar to a temp dir.
      outdir="$(mktemp -d)"
      if [ -n "${EXTRA_ENV:-}" ]; then
        while IFS= read -r line; do [ -n "$line" ] || continue; export "$line"; done <<< "$EXTRA_ENV"
      fi
      [ -n "${SOURCE_MOUNT:-}" ] && export CTF_UPSTREAM_DIR="$SOURCE_MOUNT"
      rc=0
      ( cd "$outdir" && GITHUB_WORKSPACE="$outdir" /usr/local/bin/score --quiet --target "$TARGET" --url "$APP_URL" ) || rc=$?

      # The scorer exits with the count of still-open challenges (0 = all patched); a partial
      # patch is a normal non-zero, NOT a failure. Only >=100 is a real crash.
      if [ "$rc" -ge 100 ]; then
        echo "::error::scorer failed to run (exit $rc)"
        exit "$rc"
      fi
      echo "Scorer finished: $rc challenge(s) still open."
      echo "open=$rc" >> "$GITHUB_OUTPUT"

      sidecar="$outdir/ctf-score.json"
      if [ -s "$sidecar" ]; then SCORE_OUTCOME=success; else SCORE_OUTCOME=failure; fi

      # 4+5) Record on the leaderboard (OIDC, no stored secret) + upsert the PR comment.
      cat > /tmp/record.mjs <<'RECORD_EOF'
      import { readFileSync, appendFileSync } from "node:fs";

      const env = process.env;
      const readJSON = (p) => { try { return JSON.parse(readFileSync(p, "utf8")); } catch { return null; } };
      const out = (k, v) => { if (env.GITHUB_OUTPUT) appendFileSync(env.GITHUB_OUTPUT, `${k}=${v}\n`); };

      const ev = env.GITHUB_EVENT_PATH ? readJSON(env.GITHUB_EVENT_PATH) : null;
      const pr = ev?.pull_request ?? {};
      const sc = env.SIDECAR ? readJSON(env.SIDECAR) : null;
      const solved = sc?.solved ?? [];
      const idUrl = env.ACTIONS_ID_TOKEN_REQUEST_URL;
      const idRtk = env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;

      let recorded = false;
      if (sc && env.SCORE_OUTCOME === "success") {
        if (!idUrl || !idRtk) {
          console.log("::warning::no OIDC id-token request env (need permissions: id-token: write) — leaderboard write skipped.");
        } else {
          const idToken = await fetch(`${idUrl}&audience=${encodeURIComponent(env.AUDIENCE || "ctf-score")}`, {
            headers: { Authorization: `Bearer ${idRtk}` },
          }).then((r) => r.json()).then((j) => j?.value).catch(() => null);
          if (!idToken) {
            console.log("::warning::could not mint id-token — leaderboard write skipped.");
          } else {
            const body = {
              author: pr.user?.login ?? "",
              target: sc.target,
              solved,
              pr: pr.number ?? 0,
              sha: pr.head?.sha ?? "",
            };
            const res = await fetch(`${(env.SCORE_API || "").replace(/\/$/, "")}/score`, {
              method: "POST",
              headers: { Authorization: `Bearer ${idToken}`, "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            console.log(`POST /score -> ${res.status} ${await res.text()}`);
            if ((res.status === 200 || res.status === 202) && solved.length > 0) recorded = true;
          }
        }
      }
      out("recorded", recorded);

      // PR result comment (needs github-token; container actions don't get GITHUB_TOKEN for free).
      if (env.POST_COMMENT === "true" && env.GH_TOKEN && pr.number) {
        const marker = "<!-- ctf-score-ack -->";
        const sha = (pr.head?.sha ?? "").slice(0, 7);
        const run = `${env.GITHUB_SERVER_URL}/${env.GITHUB_REPOSITORY}/actions/runs/${env.GITHUB_RUN_ID}`;
        const board = env.LEADERBOARD_URL;
        let headline, detail;
        if (env.SCORE_OUTCOME !== "success") {
          headline = "⚠️ **Scoring did not complete**";
          detail = `We couldn't score this commit — your app may have failed to build or boot. Check the [scoring run](${run}) for details, then push a new commit to retry.`;
        } else if (recorded) {
          headline = "🎉 **Score recorded!**";
          detail = `Great work — your patch has been evaluated and your result is now on the [leaderboard](${board})! 🏆 Head over and see where you rank!`;
        } else {
          headline = "✅ **Scoring complete — no points yet**";
          detail = `Your app built and ran, and we scored it against the full challenge rubric — but this commit didn't solve any challenges, so there's nothing to add to the [leaderboard](${board}) yet. Patch a vulnerability and push again! 💪`;
        }
        const cbody = `${marker}\n${headline}\n\n${detail}\n\nCommit: \`${sha}\``;
        const gh = (url, opts = {}) => fetch(url, {
          ...opts,
          headers: {
            Authorization: `Bearer ${env.GH_TOKEN}`,
            Accept: "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            ...(opts.headers || {}),
          },
        });
        const api = env.GITHUB_API_URL || "https://api.github.com";
        const listUrl = `${api}/repos/${env.GITHUB_REPOSITORY}/issues/${pr.number}/comments?per_page=100`;
        const comments = await gh(listUrl).then((r) => r.json()).catch(() => []);
        const existing = Array.isArray(comments) ? comments.find((c) => c.body?.includes(marker)) : null;
        if (existing) {
          await gh(`${api}/repos/${env.GITHUB_REPOSITORY}/issues/comments/${existing.id}`, { method: "PATCH", body: JSON.stringify({ body: cbody }) });
        } else {
          await gh(`${api}/repos/${env.GITHUB_REPOSITORY}/issues/${pr.number}/comments`, { method: "POST", body: JSON.stringify({ body: cbody }) });
        }
      }
      RECORD_EOF

      SIDECAR="$sidecar" SCORE_OUTCOME="$SCORE_OUTCOME" node /tmp/record.mjs
