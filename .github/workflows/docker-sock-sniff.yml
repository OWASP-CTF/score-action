# Sniff test: can the score image drive the host docker daemon via the mounted socket?
#
# First run proved GitHub bind-mounts /var/run/docker.sock into a runs.using=docker
# container action. Now that the score image ships the docker CLI, this checks the payoff:
# the score image, as a container action, actually building/running via the host daemon.
#
# Two angles:
#   - simulate: pull score:latest and run it with the socket mounted (proves CLI + socket).
#   - real:     use the score image AS a runs.using=docker container action (also tests
#               whether GitHub can pull the PRIVATE action image with a prior GHCR login).
name: docker-sock-sniff

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/docker-sock-sniff.yml"
      - ".github/actions/socket-sniff/**"

permissions: {}

jobs:
  simulate:
    runs-on: ubuntu-latest
    permissions:
      packages: read # pull the private score image
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run score image with the socket mounted
        run: |
          docker pull ghcr.io/owasp-ctf/score:latest
          echo "--- baked-in docker CLI version ---"
          docker run --rm --entrypoint docker ghcr.io/owasp-ctf/score:latest --version
          echo "--- can it reach the host daemon through the mounted socket? ---"
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            --entrypoint docker ghcr.io/owasp-ctf/score:latest \
            version --format 'server={{.Server.Version}}'

  container-action:
    # The real shape: score image as a runs.using=docker action. Also tests private-image
    # pull for a step-level docker:// action after a GHCR login.
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR (for the private action image pull)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Score image as a container action
        uses: ./.github/actions/socket-sniff
