name: "OWASP CTF Score Action"
description: "Score an OWASP CTF patch PR against the scorer image and record the result on the leaderboard."
branding:
  icon: "award"
  color: "purple"

# ─────────────────────────────────────────────────────────────────────────────
# COMPOSITE action. Runs on the runner host, so it can `docker login` and explicitly pull +
# run the scorer image — which means it works with an **internal/private** image (the scorer
# bakes the rubric; keeping it internal avoids leaking the answer key). A docker *container*
# action can't: GitHub pulls an action image anonymously, so an internal image 401s.
#
# The consumer checks out the PR head and mints the OIDC id-token; this action then runs the
# image's baked `entrypoint.sh` via `docker run` with the host docker socket mounted, so
# entrypoint.sh builds + boots the PR app (sibling containers on ctfnet), scores it, and POSTs
# the result. The scorer container joins ctfnet to reach the app.
#
# SECURITY — the PR's code is only ever docker build/run into containers on an --internal
# network; it never executes on the runner host, so it can't read the id-token or GITHUB_TOKEN.
# ─────────────────────────────────────────────────────────────────────────────

inputs:
  target:
    description: "Scorer target: juice-shop | dvwa | webgoat | securityshepherd | vampi | vulnerableapp."
    required: true
  app-url:
    description: "Base URL the scorer hits, reachable on the ctfnet network (e.g. http://app, http://app:8080/WebGoat)."
    required: true
  id-token:
    description: "GitHub OIDC id-token for posting the result to the leaderboard (the consumer mints it)."
    required: true
  github-token:
    description: "GitHub token used to log in to GHCR (pull the internal scorer image)."
    default: ${{ github.token }}
  score-image:
    description: "Scorer image to pull and run."
    default: "ghcr.io/owasp-ctf/score:latest"

runs:
  using: "composite"
  steps:
    - name: Log in to GHCR (pull the internal scorer image)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Score + record
      shell: bash
      env:
        SCORE_IMAGE: ${{ inputs.score-image }}
        TARGET: ${{ inputs.target }}
        APP_URL: ${{ inputs.app-url }}
        ID_TOKEN: ${{ inputs.id-token }}
        SCORE_API: "https://dyekymos1dkde.cloudfront.net" # TEMP: revert to https://api.ctf.owasp.org once DNS lands
      run: |
        set -euo pipefail
        # Run the image's baked entrypoint.sh: sandbox network -> build/boot the PR app -> score
        # -> POST. The host docker socket lets it build/run the PR app as sibling containers; the
        # workspace mount gives it the checked-out PR (docker build context); the event mount gives
        # --post its provenance (author/pr/sha). --entrypoint is an absolute path (image ENTRYPOINT
        # is the score binary).
        docker run --rm \
          --entrypoint /usr/local/bin/entrypoint.sh \
          -e TARGET -e APP_URL -e ID_TOKEN -e SCORE_API -e NETWORK=ctfnet \
          -e GITHUB_WORKSPACE=/github/workspace \
          -e GITHUB_EVENT_PATH=/github/event.json \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -v "${GITHUB_EVENT_PATH}:/github/event.json:ro" \
          "$SCORE_IMAGE"
