name: "OWASP CTF Score Action"
description: "Score an OWASP CTF patch PR against the scorer image and record the result on the leaderboard."
branding:
  icon: "award"
  color: "purple"

# Composite (not a container action) so it can docker login and pull the internal scorer image.
# The PR's code only runs inside containers on the --internal ctfnet, never on the host.

inputs:
  target:
    description: "Scorer target: juice-shop | dvwa | webgoat | securityshepherd | vampi | vulnerableapp."
    required: true
  app-url:
    description: "Base URL the scorer hits, reachable on the ctfnet network (e.g. http://app, http://app:8080/WebGoat)."
    required: true
  ref:
    description: "PR head to check out and build (untrusted — only docker-built, never run on the host)."
    default: ${{ github.event.pull_request.head.sha }}
  id-token-audience:
    description: "Audience for the minted OIDC id-token the leaderboard authorizes."
    default: "ctf-score"
  github-token:
    description: "GitHub token used to log in to GHCR (pull the internal scorer image)."
    default: ${{ github.token }}
  score-image:
    description: "Scorer image to pull and run."
    default: "ghcr.io/owasp-ctf/score:latest"

runs:
  using: "composite"
  steps:
    - name: Check out the PR head (untrusted — only docker-built, never run on the host)
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Mint the OIDC id-token for the leaderboard
      id: identity
      uses: cnuss/actions-identity@b9bc5d6472e00dfca0490bdf539eb4d4b729807d # v1.1.0
      with:
        id-token-audience: ${{ inputs.id-token-audience }}

    - name: Log in to GHCR (pull the internal scorer image)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Score + record
      shell: bash
      env:
        SCORE_IMAGE: ${{ inputs.score-image }}
        TARGET: ${{ inputs.target }}
        APP_URL: ${{ inputs.app-url }}
        ID_TOKEN: ${{ steps.identity.outputs.id-token }}
        SCORE_API: "https://dyekymos1dkde.cloudfront.net" # TEMP: revert to https://api.ctf.owasp.org once DNS lands
      run: |
        set -euo pipefail
        # Run the image's baked entrypoint.sh: build/boot the PR app on ctfnet, score, POST.
        docker run --rm \
          --entrypoint /usr/local/bin/entrypoint.sh \
          -e TARGET -e APP_URL -e ID_TOKEN -e SCORE_API -e NETWORK=ctfnet \
          -e GITHUB_WORKSPACE=/github/workspace \
          -e GITHUB_EVENT_PATH=/github/event.json \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -v "${GITHUB_EVENT_PATH}:/github/event.json:ro" \
          "$SCORE_IMAGE"
