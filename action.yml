name: "OWASP CTF Score Action"
description: "Score an OWASP CTF patch PR against the scorer image and record the result on the leaderboard."
branding:
  icon: "award"
  color: "purple"

inputs:
  target:
    description: "Scorer target: juice-shop | dvwa | webgoat | securityshepherd | vampi | vulnerableapp."
    required: true
  app-url:
    description: "Base URL score.sh hits, reachable on the ctfnet network (e.g. http://app, http://app:8080/WebGoat)."
    required: true
  id-token:
    description: "GitHub OIDC id-token for posting the result to the leaderboard."
    required: true
  github-token:
    description: "GitHub token for the PR result comment."
    default: ${{ github.token }}

runs:
  using: "docker"
  image: "Dockerfile" # build locally FROM the public scorer image (see ./Dockerfile)
  # entrypoint.sh (baked in the image) does the whole job in one container — sandbox network,
  # build + boot the PR app, join the network, score, POST. It runs at the `uses:` position
  # (after the consumer's checkout + id-token mint), NOT as a pre-entrypoint: GitHub runs action
  # pre-steps at job start, before checkout, so the workspace would be empty (proven on DVWA#29).
  entrypoint: "entrypoint.sh"
  env:
    SCORE_API: "https://dyekymos1dkde.cloudfront.net" # TEMP: api.ctf.owasp.org CNAME not wired yet; revert once DNS lands
    LEADERBOARD_URL: "https://ctf.owasp.org/leaderboard"
    GH_TOKEN: ${{ inputs.github-token }} # from the input default; runs.env can't read `github` directly
    ID_TOKEN: ${{ inputs.id-token }}
    TARGET: ${{ inputs.target }}
    APP_URL: ${{ inputs.app-url }}
