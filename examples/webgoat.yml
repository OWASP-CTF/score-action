# Consumer workflow for an OWASP-CTF/WebGoat CTF fork.
# Copy to the fork as: .github/workflows/ctf-score.yml
#
# WebGoat needs a Maven build first, a registered scoring user, and some docker-side recon
# (the sandboxed scorer has no docker) passed to the scorer via extra-env.
name: ctf-score

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ctf-score-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      id-token: write
      pull-requests: write
    steps:
      - name: Check out the PR head (untrusted — only docker-built, never run on the host)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build the WebGoat jar (Maven) then the app image
        run: |
          docker run --rm -v "$PWD":/src -w /src eclipse-temurin:25-jdk-noble ./mvnw -q clean package -DskipTests
          docker build -t ctf-app:pr .
          docker network create --internal ctfnet
          docker run -d --name app --network ctfnet -e TZ=Etc/UTC ctf-app:pr

      - name: Wait for WebGoat and register the scoring user
        run: |
          docker run --rm --entrypoint node --network ctfnet ghcr.io/owasp-ctf/score:latest -e '
            const B = "http://app:8080/WebGoat";
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const get = (u, o = {}) => fetch(u, { redirect: "manual", signal: AbortSignal.timeout(8000), ...o });
            (async () => {
              let up = false;
              for (let i = 0; i < 60; i++) { try { if ((await get(B + "/login")).ok) { up = true; break; } } catch {} await sleep(3000); }
              if (!up) { console.error("WebGoat never served /login"); process.exit(2); }
              const body = new URLSearchParams({ username: "webgoat", password: "webgoat", matchingPassword: "webgoat", agree: "agree" });
              const reg = await get(B + "/register.mvc", { method: "POST", headers: { "content-type": "application/x-www-form-urlencoded" }, body: body.toString() });
              console.log("register.mvc -> " + reg.status); process.exit(0);
            })();
          '

      - name: Gather docker-side recon for the sandboxed scorer
        run: |
          # WebGoat 72/74 need docker to read the app log / build the deser gadget; the
          # sandboxed scorer has none, so gather here and hand off via extra-env.
          LEAK=$(docker logs app 2>&1 | grep -oE 'Password for admin: *[A-Za-z0-9+/=]{20,}' | tail -1 | sed 's/.*: *//')
          echo "WEBGOAT_LEAKED_ADMIN_PW=$(printf '%s' "$LEAK" | base64 -d 2>/dev/null || true)" >> "$GITHUB_ENV"
          GENB64=''
          PAYLOAD=$(docker exec -e GENB64="$GENB64" app sh -c 'cd /tmp && rm -rf wgd && mkdir wgd && cd wgd && jar xf /home/webgoat/webgoat.jar BOOT-INF/classes/org/dummy/insecure/framework/VulnerableTaskHolder.class 2>/dev/null; SLF4J=$(jar tf /home/webgoat/webgoat.jar | grep -i slf4j-api | head -1); jar xf /home/webgoat/webgoat.jar "$SLF4J" 2>/dev/null; CP="BOOT-INF/classes:$SLF4J"; echo "$GENB64" | base64 -d > Gen.java; javac -cp "$CP" Gen.java 2>/dev/null; java -cp "$CP:." Gen 2>/dev/null' | tail -1)
          echo "WEBGOAT_DESER_PAYLOAD=$PAYLOAD" >> "$GITHUB_ENV"

      - name: Score + record
        uses: OWASP-CTF/score-action@main
        with:
          target: webgoat
          app-url: http://app:8080/WebGoat
          extra-env: |
            WEBWOLF_URL=http://app:9090/WebWolf
            WEBGOAT_LEAKED_ADMIN_PW=${{ env.WEBGOAT_LEAKED_ADMIN_PW }}
            WEBGOAT_DESER_PAYLOAD=${{ env.WEBGOAT_DESER_PAYLOAD }}

      - name: Stop the app
        if: always()
        run: docker rm -f app 2>/dev/null || true
